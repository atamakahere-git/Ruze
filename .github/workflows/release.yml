name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  lint:
    name: Clippy + fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2

      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets --all-features --locked -- -D warnings

  build:
    name: Build ${{ matrix.target }}
    needs: lint
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            suffix: amd64
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary
        run: strip target/${{ matrix.target }}/release/vvv

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vvv-linux-${{ matrix.suffix }}
          path: target/${{ matrix.target }}/release/vvv

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - run: |
          cp artifacts/vvv-linux-amd64/vvv    vvv-linux-amd64
          cp artifacts/vvv-linux-arm64/vvv    vvv-linux-arm64
          chmod +x vvv-linux-*
          sha256sum vvv-linux-* > checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            vvv-linux-amd64
            vvv-linux-arm64
            checksums.txt
          generate_release_notes: true
